<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join BerrySMP, a free-to-play Minecraft Lifesteal server.">
    <meta property="og:title" content="BerrySMP - Lifesteal Minecraft Server">
    <meta property="og:description" content="Join BerrySMP Season 2 Lifesteal. Free-to-play, no pay-to-win.">
    <meta property="og:url" content="https://berrys2.github.io/">
    <meta name="theme-color" content="#ff2a5f">
    <title>BerrySMP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        h1 span {
            color: #ff2a5f;
        }

        .status {
            font-size: 13px;
            color: #8b8599;
            margin-bottom: 30px;
        }

        .join-section {
            background: #2a2a2a;
            border: 2px solid #ff2a5f;
            padding: 16px;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .join-section span {
            font-family: monospace;
            font-size: 14px;
        }

        .copy-btn {
            background: #ff2a5f;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #ff1a4f;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #444;
            background: #2a2a2a;
            color: white;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .btn:hover {
            border-color: #ff2a5f;
        }

        .btn-discord {
            border-color: #5865f2;
        }

        .btn-discord:hover {
            background: #5865f2;
            color: white;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 16px;
            border-bottom: 2px solid #ff2a5f;
            padding-bottom: 8px;
        }

        .items-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 40px;
        }

        .item {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 16px;
            text-align: center;
        }

        .item-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 10px;
            image-rendering: pixelated;
        }

        .item-name {
            font-weight: bold;
            font-size: 13px;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #4b4556;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Berry<span>SMP</span></h1>
            <div class="status" id="serverStatus">checking status...</div>
        </header>

        <div class="join-section" onclick="copyAddress()">
            <span id="ipText">wss://berrysmpS2.eagler.host</span>
            <button class="copy-btn" id="copyBtn">Copy</button>
        </div>

        <div class="buttons">
            <a href="https://discord.gg/fdcgxVs7p" target="_blank" class="btn btn-discord">Discord</a>
            <a href="https://topeaglerservers.com/earn/berrysmpS2" target="_blank" class="btn">Earn</a>
        </div>

        <h2>Custom Items</h2>
        <div class="items-list">
            <div class="item">
                <img class="item-icon" src="https://cdn-icons-png.flaticon.com/512/3556/3556091.png" alt="Mace">
                <div class="item-name">Mace</div>
            </div>
            <div class="item">
                <img class="item-icon" src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="Spear">
                <div class="item-name">Spears</div>
            </div>
            <div class="item">
                <img class="item-icon" src="https://cdn-icons-png.flaticon.com/512/2318/2318500.png" alt="Wind Charge">
                <div class="item-name">Wind Charges</div>
            </div>
            <div class="item">
                <img class="item-icon" src="https://cdn-icons-png.flaticon.com/512/1995/1995488.png" alt="Heart">
                <div class="item-name">Hearts</div>
            </div>
        </div>

        <footer>
            made by jumps & aroze
        </footer>
    </div>

    <script>
        const serverState = "online";

        function displayStatus() {
            const statusDiv = document.getElementById('serverStatus');
            if (serverState === "online") {
                statusDiv.innerHTML = '✓ Server Online';
                statusDiv.style.color = '#00b050';
            } else if (serverState === "offline") {
                statusDiv.innerHTML = '⚠ Server Offline';
                statusDiv.style.color = '#ff2a5f';
            } else {
                statusDiv.innerHTML = '🔒 Whitelist Active';
                statusDiv.style.color = '#ffd700';
            }
        }

        function copyAddress() {
            const address = "wss://berrysmpS2.eagler.host";
            navigator.clipboard.writeText(address).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = 'Copied!';
                setTimeout(() => {
                    btn.innerText = 'Copy';
                }, 1500);
            });
        }

        window.onload = displayStatus;
    </script>
</body>
</html>
